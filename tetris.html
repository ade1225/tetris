<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== CSS Custom Properties (themed) ===== */
  :root {
    --bg-start: #0a0a1a;
    --bg-end: #1a1a3e;
    --panel-bg: rgba(255,255,255,0.04);
    --panel-box: rgba(0,0,0,0.35);
    --border-color: rgba(255,255,255,0.07);
    --text-color: #fff;
    --text-dim: rgba(255,255,255,0.35);
    --board-bg: #0d0d22;
    --board-border: rgba(255,255,255,0.12);
    --cell-border: rgba(255,255,255,0.04);
    --accent: #e94560;
    --btn-bg: rgba(255,255,255,0.06);
    --btn-border: rgba(255,255,255,0.1);
    --overlay-bg: rgba(0,0,0,0.7);
    --shadow-color: rgba(0,0,0,0.6);
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text-color);
    user-select: none;
    overflow: hidden;
    transition: background 0.5s ease, color 0.5s ease;
  }

  .game-wrapper {
    display: flex;
    gap: 16px;
    align-items: stretch;
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: 0 25px 60px var(--shadow-color);
    max-height: 100vh;
    transition: background 0.5s ease, border-color 0.5s ease;
  }

  /* ---- Board ---- */
  .board-container {
    position: relative;
  }

  #board {
    display: grid;
    border: 2px solid var(--board-border);
    border-radius: 6px;
    background: var(--board-bg);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transition: background 0.5s ease, border-color 0.5s ease;
  }

  .cell {
    border: 1px solid rgba(0,0,0,0.15);
    transition: background 0.06s;
    border-radius: 2px;
  }

  /* ---- Side Panel ---- */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 120px;
    justify-content: space-between;
  }

  .panel-box {
    background: var(--panel-box);
    border-radius: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    transition: background 0.5s ease, border-color 0.5s ease;
  }

  .panel-box h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Theme Switcher ---- */
  .theme-switcher {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .theme-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }

  .theme-dot:hover {
    transform: scale(1.15);
  }

  .theme-dot.active {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .theme-dot::after {
    content: attr(data-label);
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    white-space: nowrap;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .theme-dot:hover::after {
    opacity: 1;
  }

  /* ---- Next piece preview ---- */
  #next-canvas {
    display: block;
    margin: 0 auto;
    background: transparent;
    max-width: 100%;
  }

  /* ---- Controls ---- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .controls .row {
    display: flex;
    justify-content: center;
    gap: 3px;
  }

  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--text-color);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active {
    background: rgba(255,255,255,0.15);
  }

  .ctrl-btn.wide {
    width: 78px;
  }

  #restart-btn {
    margin-top: 4px;
    width: 100%;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
    letter-spacing: 1px;
  }

  #restart-btn:hover {
    background: color-mix(in srgb, var(--accent) 25%, transparent);
  }

  #pause-btn {
    padding: 6px;
    border-radius: 8px;
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--text-color);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    flex: 1;
  }
  #pause-btn:hover {
    background: rgba(255,255,255,0.1);
  }

  /* ---- Game Over overlay ---- */
  .overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(4px);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay h2 {
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .overlay p {
    font-size: 14px;
    color: var(--text-dim);
  }

  #restart-overlay-btn {
    margin-top: 8px;
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--text-color);
    font-size: 15px;
    cursor: pointer;
  }

  /* ---- Mobile hint ---- */
  .mobile-hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  @media (max-width: 600px) {
    .game-wrapper {
      flex-direction: column;
      align-items: center;
      padding: 10px;
      gap: 8px;
    }
    .cell { border-radius: 1px; }
    .side-panel { flex-direction: row; flex-wrap: wrap; justify-content: center; min-width: auto; gap: 4px; }
    .panel-box { padding: 4px 8px; }
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="board-container">
    <div id="board"></div>
    <div class="overlay" id="overlay">
      <h2>GAME OVER</h2>
      <p>得分: <span id="final-score">0</span></p>
      <button id="restart-overlay-btn">重新开始</button>
    </div>
    <div class="overlay" id="pause-overlay">
      <h2 style="font-size:28px;letter-spacing:6px;">⏸ PAUSED</h2>
      <p style="font-size:13px;color:rgba(255,255,255,0.4);">按 P 或点击继续</p>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <h3>配色</h3>
      <div class="theme-switcher" id="theme-switcher"></div>
    </div>

    <div class="panel-box">
      <h3>下一个</h3>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>

    <div class="panel-box">
      <h3>得分</h3>
      <div class="stat-value" id="score-display">0</div>
    </div>

    <div class="panel-box">
      <h3>行数</h3>
      <div class="stat-value" id="lines-display">0</div>
    </div>

    <div class="panel-box">
      <h3>等级</h3>
      <div class="stat-value" id="level-display">1</div>
    </div>

    <div class="panel-box controls">
      <div class="row">
        <button class="ctrl-btn" data-action="left">◀</button>
        <button class="ctrl-btn" data-action="down">▼</button>
        <button class="ctrl-btn" data-action="right">▶</button>
      </div>
      <div class="row">
        <button class="ctrl-btn" data-action="rotate">↻</button>
        <button class="ctrl-btn wide" data-action="drop">⤓ 落下</button>
      </div>
      <div style="display:flex;gap:4px;">
        <button id="pause-btn">⏸ 暂停</button>
        <button id="restart-btn" style="flex:1;">↺ 重置</button>
      </div>
      <div class="mobile-hint">键盘: ← → ↓ ↑旋转 空格落下 P暂停</div>
    </div>
  </div>
</div>

<script>
// =============================================

    panelBox: 'rgba(0,0,0,0.3)',
    boardBg: '#1a0f1a',
    boardBorder: 'rgba(255,150,150,0.18)',
    cellBorder: 'rgba(255,150,150,0.06)',

  },
  ocean: {

    colors: { I: '#48dbfb', O: '#0abde3', T: '#54a0ff', S: '#5f27cd', Z: '#01a3a4', J: '#00d2d3', L: '#10ac84' },
    bgStart: '#0a1628',   bgEnd: '#0a2840',
    panelBg: 'rgba(0,200,255,0.03)',
    panelBox: 'rgba(0,20,40,0.4)',
    boardBg: '#06121e',
    boardBorder: 'rgba(0,200,255,0.15)',
    cellBorder: 'rgba(0,200,255,0.05)',
    borderColor: 'rgba(0,200,255,0.08)',
    textColor: '#b0e0ff',
    textDim: 'rgba(100,200,255,0.35)',

    btnBorder: 'rgba(0,200,255,0.13)',

  },
  sakura: {
    label: '樱花',
    colors: { I: '#f8bbd0', O: '#f48fb1', T: '#f06292', S: '#ec407a', Z: '#d81b60', J: '#c2185b', L: '#ad1457' },
    bgStart: '#2a1a24',   bgEnd: '#3a1a2e',
    panelBg: 'rgba(255,180,200,0.04)',
    panelBox: 'rgba(0,0,0,0.3)',
    boardBg: '#1a1018',
    boardBorder: 'rgba(240,150,180,0.18)',
    cellBorder: 'rgba(240,150,180,0.06)',
    borderColor: 'rgba(240,150,180,0.1)',
    textColor: '#fce4ec',
    textDim: 'rgba(240,150,180,0.4)',
    accent: '#f06292',
    btnBg: 'rgba(240,150,180,0.08)',
    btnBorder: 'rgba(240,150,180,0.15)',
    overlayBg: 'rgba(26,16,24,0.8)',
    shadow: 'rgba(40,10,30,0.6)',
    dotGrad: 'linear-gradient(135deg,#2a1a24,#3a1a2e)',
  },
  cyber: {
    label: '赛博',
    colors: { I: '#ff00ff', O: '#ffff00', T: '#00ffff', S: '#00ff88', Z: '#ff0055', J: '#5500ff', L: '#ff8800' },
    bgStart: '#050510',   bgEnd: '#0f0520',
    panelBg: 'rgba(0,255,255,0.03)',
    panelBox: 'rgba(0,0,0,0.5)',
    boardBg: '#0a0012',
    boardBorder: 'rgba(255,0,255,0.25)',
    cellBorder: 'rgba(255,0,255,0.08)',
    borderColor: 'rgba(0,255,255,0.1)',
    textColor: '#c0ffff',
    textDim: 'rgba(180,0,255,0.35)',
    accent: '#ff00ff',
    btnBg: 'rgba(255,0,255,0.08)',
    btnBorder: 'rgba(255,0,255,0.18)',
    overlayBg: 'rgba(5,0,10,0.85)',
    shadow: 'rgba(255,0,255,0.15)',
    dotGrad: 'linear-gradient(135deg,#050510,#0f0520)',
  },
};

const THEME_NAMES = Object.keys(THEMES);

// =============================================
//  CONSTANTS
// =============================================
const COLS = 10;
const ROWS = 20;
let CELL = 26;

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]],
};

const PIECE_NAMES = Object.keys(SHAPES);

// =============================================
//  STATE
// =============================================
let board = [];
let current = null;
let next = null;
let score = 0;
let lines = 0;
let level = 1;
let gameOver = false;
let paused = false;
let dropInterval = null;

let currentTheme = localStorage.getItem('tetris-theme') || 'neon';
if (!THEME_NAMES.includes(currentTheme)) currentTheme = 'neon';

const boardEl = document.getElementById('board');
const nextCanvas = document.getElementById('next-canvas');
const ctx = nextCanvas.getContext('2d');
const scoreEl = document.getElementById('score-display');
const linesEl = document.getElementById('lines-display');
const levelEl = document.getElementById('level-display');
const overlay = document.getElementById('overlay');
const finalScoreEl = document.getElementById('final-score');
const themeSwitcher = document.getElementById('theme-switcher');

// =============================================
//  THEME ENGINE
// =============================================
function applyTheme(name) {
  currentTheme = name;
  const t = THEMES[name];
  if (!t) return;

  const root = document.documentElement;
  root.style.setProperty('--bg-start', t.bgStart);
  root.style.setProperty('--bg-end', t.bgEnd);
  root.style.setProperty('--panel-bg', t.panelBg);
  root.style.setProperty('--panel-box', t.panelBox);
  root.style.setProperty('--board-bg', t.boardBg);
  root.style.setProperty('--board-border', t.boardBorder);
  root.style.setProperty('--cell-border', t.cellBorder);
  root.style.setProperty('--border-color', t.borderColor);
  root.style.setProperty('--text-color', t.textColor);
  root.style.setProperty('--text-dim', t.textDim);
  root.style.setProperty('--accent', t.accent);
  root.style.setProperty('--btn-bg', t.btnBg);
  root.style.setProperty('--btn-border', t.btnBorder);
  root.style.setProperty('--overlay-bg', t.overlayBg);
  root.style.setProperty('--shadow-color', t.shadow);

  // Update COLORS reference used by game logic
  Object.assign(COLORS, t.colors);

  // Update theme dots
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.classList.toggle('active', dot.dataset.theme === name);
  });

  // Re-render
  drawNext();
  renderBoard();

  localStorage.setItem('tetris-theme', name);
}

function buildThemeUI() {
  themeSwitcher.innerHTML = '';
  THEME_NAMES.forEach(name => {
    const t = THEMES[name];
    const dot = document.createElement('div');
    dot.className = 'theme-dot';
    dot.dataset.theme = name;
    dot.dataset.label = t.label;
    dot.style.background = t.dotGrad;
    dot.style.borderColor = name === currentTheme ? 'var(--accent)' : 'rgba(255,255,255,0.12)';
    dot.title = t.label;
    dot.addEventListener('click', () => applyTheme(name));
    themeSwitcher.appendChild(dot);
  });
}

// =============================================
//  COLORS (live object, mutated by theme)
// =============================================
const COLORS = { ...THEMES.neon.colors };

// =============================================
//  3D CELL STYLING
// =============================================
function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}

function rgbStr(r, g, b) {
  return `rgb(${r},${g},${b})`;
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0')).join('');
}

function lighten(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return rgbToHex(r + (255 - r) * amt, g + (255 - g) * amt, b + (255 - b) * amt);
}

function darken(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return rgbToHex(r * (1 - amt), g * (1 - amt), b * (1 - amt));
}

function styleForCell3D(hexColor) {
  // Skip transparent/null
  if (!hexColor || hexColor === 'transparent') {
    return { background: 'transparent', boxShadow: 'none' };
  }

  const light = lighten(hexColor, 0.55);
  const dark  = darken(hexColor, 0.40);
  const darker = darken(hexColor, 0.60);

  // Top-left light source: gradient + inset bevel shadows
  const background = `linear-gradient(
    135deg,
    ${light} 0%,
    ${hexColor} 45%,
    ${dark} 100%
  )`;

  const boxShadow = [
    // inner top-left highlight (light source)
    `inset 2px 2px 4px ${lighten(hexColor, 0.7)}`,
    // inner bottom-right shadow
    `inset -2px -2px 4px ${darker}`,
    // subtle outer depth
    `0 2px 4px rgba(0,0,0,0.3)`,
    // tiny inner edge light
    `inset 0 0 2px rgba(255,255,255,0.15)`,
  ].join(', ');

  return { background, boxShadow };
}

// =============================================
//  BOARD HELPERS
// =============================================
function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function renderBoard() {
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${CELL}px)`;
  boardEl.style.gridTemplateRows = `repeat(${ROWS}, ${CELL}px)`;
  boardEl.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const s = styleForCell3D(board[r][c]);
      cell.style.background = s.background;
      cell.style.boxShadow = s.boxShadow;
      boardEl.appendChild(cell);
    }
  }

  // Overlay current piece (drawn on top of locked cells)
  if (current && !gameOver) {
    const { matrix, row, col, name } = current;
    const color = COLORS[name];
    const s = styleForCell3D(color);
    for (let r = 0; r < matrix.length; r++) {
      for (let c = 0; c < matrix[0].length; c++) {
        if (matrix[r][c]) {
          const idx = (row + r) * COLS + (col + c);
          if (row + r >= 0) {
            const cell = boardEl.children[idx];
            if (cell) {
              cell.style.background = s.background;
              cell.style.boxShadow = s.boxShadow;
            }
          }
        }
      }
    }
  }
}

// =============================================
//  PIECE LOGIC
// =============================================
function randomPiece() {
  const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
  return {
    name,
    matrix: SHAPES[name].map(row => [...row]),
    row: 0,
    col: Math.floor((COLS - SHAPES[name][0].length) / 2),
  };
}

function rotateMatrix(mat) {
  return mat[0].map((_, idx) => mat.map(row => row[idx]).reverse());
}

function collide(mat, r, c) {
  for (let i = 0; i < mat.length; i++) {
    for (let j = 0; j < mat[0].length; j++) {
      if (mat[i][j]) {
        const nr = r + i;
        const nc = c + j;
        if (nc < 0 || nc >= COLS || nr >= ROWS) return true;
        if (nr < 0) continue;
        if (board[nr][nc] !== null) return true;
      }
    }
  }
  return false;
}

function lockPiece() {
  const { name, matrix, row, col } = current;
  for (let r = 0; r < matrix.length; r++) {
    for (let c = 0; c < matrix[0].length; c++) {
      if (matrix[r][c]) {
        const br = row + r;
        const bc = col + c;
        if (br < 0) { endGame(); return; }
        board[br][bc] = COLORS[name];
      }
    }
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; ) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
    } else {
      r--;
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800][cleared] || 800;
    score += points * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    updateStats();
    resetDropInterval();
  }
}

// =============================================
//  GAME FLOW
// =============================================
function spawnPiece() {
  if (next) {
    current = next;
    current.row = 0;
    current.col = Math.floor((COLS - current.matrix[0].length) / 2);
  } else {
    current = randomPiece();
  }
  next = randomPiece();
  drawNext();
  if (collide(current.matrix, current.row, current.col)) endGame();
  renderBoard();
}

function endGame() {
  gameOver = true;
  finalScoreEl.textContent = score;
  overlay.classList.add('show');
  clearInterval(dropInterval);
}

function resetDropInterval() {
  clearInterval(dropInterval);
  const speed = Math.max(50, 800 - (level - 1) * 70);
  dropInterval = setInterval(() => {
    if (!gameOver && !paused) moveDown();
  }, speed);
}

function moveDown() {
  if (!current || gameOver) return;
  if (!collide(current.matrix, current.row + 1, current.col)) {
    current.row++;
    renderBoard();
  } else {
    lockPiece();
    renderBoard();
  }
}

function move(dir) {
  if (!current || gameOver) return;
  if (!collide(current.matrix, current.row, current.col + dir)) {
    current.col += dir;
    renderBoard();
  }
}

function rotate() {
  if (!current || gameOver) return;
  const rotated = rotateMatrix(current.matrix);
  if (!collide(rotated, current.row, current.col)) {
    current.matrix = rotated;
    renderBoard();
    return;
  }
  for (const offset of [-1, 1, -2, 2]) {
    if (!collide(rotated, current.row, current.col + offset)) {
      current.matrix = rotated;
      current.col += offset;
      renderBoard();
      return;
    }
  }
}

function hardDrop() {
  if (!current || gameOver) return;
  while (!collide(current.matrix, current.row + 1, current.col)) current.row++;
  lockPiece();
  renderBoard();
}

// =============================================
//  NEXT PREVIEW
// =============================================
// =============================================
//  RESPONSIVE SIZING
// =============================================
function calcCellSize() {
  const availH = window.innerHeight - 40;
  const maxCell = Math.floor((availH - 10) / ROWS);
  CELL = Math.max(14, Math.min(34, maxCell));
}

function fitToViewport() {
  calcCellSize();
  const previewCell = Math.round(CELL * 0.85);
  const canvasSz = previewCell * 4 + 10;
  nextCanvas.width = canvasSz;
  nextCanvas.height = canvasSz;
  renderBoard();
  drawNext();
}

window.addEventListener('resize', fitToViewport);
window.addEventListener('load', fitToViewport);

// =============================================
//  NEXT PREVIEW
// =============================================
function drawNext() {
  const previewCell = Math.round(CELL * 0.85);
  const canvasSz = previewCell * 4 + 10;
  ctx.clearRect(0, 0, canvasSz, canvasSz);
  if (!next) return;
  const mat = next.matrix;
  const color = COLORS[next.name];
  const offsetX = (canvasSz - mat[0].length * previewCell) / 2;
  const offsetY = (canvasSz - mat.length * previewCell) / 2;

  const light  = lighten(color, 0.55);
  const dark   = darken(color, 0.40);
  const darker = darken(color, 0.60);

  for (let r = 0; r < mat.length; r++) {
    for (let c = 0; c < mat[0].length; c++) {
      if (mat[r][c]) {
        const x = offsetX + c * previewCell;
        const y = offsetY + r * previewCell;
        const w = previewCell - 2;
        const h = previewCell - 2;
        const r2 = Math.max(2, Math.round(w * 0.15));

        // 3D gradient fill
        const grad = ctx.createLinearGradient(x, y, x + w, y + h);
        grad.addColorStop(0, light);
        grad.addColorStop(0.45, color);
        grad.addColorStop(1, dark);
        ctx.fillStyle = grad;

        // Inner shadow effect: draw darker border region first
        ctx.shadowColor = 'rgba(0,0,0,0)'; // no outer glow, we do our own
        ctx.shadowBlur = 0;

        // Block body
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 4);
        ctx.fill();

        // Highlight (top-left edge)
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(x + 1, y + 1, w - 2, h - 2, 3);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fill();
        ctx.restore();

        // Subtle outer glow matching piece color
        ctx.shadowColor = color + '44';
        ctx.shadowBlur = 10;
        ctx.strokeStyle = 'transparent';
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }
}

// =============================================
//  STATS
// =============================================
function updateStats() {
  scoreEl.textContent = score;
  linesEl.textContent = lines;
  levelEl.textContent = level;
}

// =============================================
//  RESTART
// =============================================
function restart() {
  gameOver = false;
  overlay.classList.remove('show');
  calcCellSize();
  // Resize next canvas to match CELL size
  const sz = Math.round(CELL * 0.85) * 4 + 10;
  nextCanvas.width = sz;
  nextCanvas.height = sz;
  board = createBoard();
  score = 0;
  lines = 0;
  level = 1;
  updateStats();
  next = null;
  spawnPiece();
  resetDropInterval();
  renderBoard();
}

// =============================================
//  KEYBOARD
// =============================================
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  if (e.key === 'ArrowLeft')  move(-1);
  if (e.key === 'ArrowRight') move(1);
  if (e.key === 'ArrowDown')  moveDown();
  if (e.key === 'ArrowUp')    rotate();
  if (e.key === 'p' || e.key === 'P') togglePause();
});

// =============================================
//  BUTTONS
// =============================================
document.querySelectorAll('.ctrl-btn[data-action]').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = btn.dataset.action;
    if (a === 'left')   move(-1);
    if (a === 'right')  move(1);
    if (a === 'down')   moveDown();
    if (a === 'rotate') rotate();
    if (a === 'drop')   hardDrop();
  });
});

document.getElementById('restart-btn').addEventListener('click', restart);
document.getElementById('restart-overlay-btn').addEventListener('click', restart);

// =============================================
//  PAUSE
// =============================================
const pauseOverlay = document.getElementById('pause-overlay');
const pauseBtn = document.getElementById('pause-btn');

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  pauseOverlay.classList.toggle('show', paused);
  pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
}

pauseBtn.addEventListener('click', togglePause);
pauseOverlay.addEventListener('click', togglePause);

// =============================================
//  POLYFILL roundRect
// =============================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

// =============================================
//  INIT
// =============================================
buildThemeUI();
applyTheme(currentTheme);
restart();
</script>
</body>
</html>
